version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: builderpro-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: builderpro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - builderpro-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: builderpro-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/builderpro
    depends_on:
      - postgres
    volumes:
      - .:/app
    networks:
      - builderpro-network

volumes:
  postgres_data:

networks:
  builderpro-network:
    driver: bridge
